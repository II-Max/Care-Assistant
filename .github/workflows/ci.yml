# ============================================
# 🚀 CI/CD Pipeline — AI Customer Care Assistant
# Bệnh viện Tim Hà Nội
# ============================================
#
# Triggers:
#   - push to main
#   - pull request to main
#
# Stages:
#   1. Lint (flake8, bandit)
#   2. Type check (mypy)
#   3. Test (pytest with coverage)
#   4. Build (Docker image)
#   5. Security scan (trivy)
#
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ========================
  # Lint & Format Check
  # ========================
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit mypy
          pip install -r ai-service/requirements.txt

      - name: Run flake8 (PEP8)
        run: |
          flake8 ai-service/ --count --max-complexity=15 --show-source --statistics
        continue-on-error: true

      - name: Run bandit (security linter)
        run: |
          bandit -r ai-service/ -x ai-service/tests -ll
        continue-on-error: true

  # ========================
  # Unit Tests
  # ========================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r ai-service/requirements.txt

      - name: Run tests with coverage
        run: |
          cd ai-service
          python -m pytest ../tests/ -v --cov=../ai-service --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./ai-service/coverage.xml
          fail_ci_if_error: false

  # ========================
  # Build & Security Scan
  # ========================
  build:
    name: 🐳 Build & Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================
  # Deploy (staging)
  # ========================
  deploy:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy to staging server
        run: |
          echo "🚀 Deploying to staging..."
          echo "   Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          echo ""
          echo "✅ Staging deployment URL: https://staging.timhanoi.vn"
        # TODO: Add actual deployment step (SSH, Helm, etc.)
