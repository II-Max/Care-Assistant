# ============================================
# 🏥 AI Customer Care Assistant — Docker Compose
# Bệnh viện Tim Hà Nội
# ============================================
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f ai-service  # Watch AI service logs
#   docker-compose down               # Stop all services
#
# Services:
#   1. ai-service  — FastAPI (port 8001)
#   2. postgres    — PostgreSQL (port 5432)
#   3. redis       — Redis for notification worker (port 6379)
#
# ============================================

version: "3.9"

services:
  # ========================
  # PostgreSQL Database
  # ========================
  postgres:
    image: postgres:16-alpine
    container_name: care-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: care_assistant
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ai-service/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
      - ./ai-service/database/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d care_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - care-assistant-net

  # ========================
  # Redis (Notification Queue)
  # ========================
  redis:
    image: redis:7-alpine
    container_name: care-assistant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - care-assistant-net

  # ========================
  # AI Service (FastAPI)
  # ========================
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: care-assistant-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Override DB settings for Docker networking
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: care_assistant
      DB_USER: app_user
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      # Mount knowledge base for hot-reload (restart needed for rebuild)
      - ./knowledge/approved:/app/knowledge/approved
      # Mount Data directory (legacy)
      - ./Data:/app/Data
      # Persistent ChromaDB index
      - chroma_db:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - care-assistant-net

# ========================
# Volumes
# ========================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_db:
    driver: local

# ========================
# Networks
# ========================
networks:
  care-assistant-net:
    driver: bridge
